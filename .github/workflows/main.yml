name: LongCat-WhatsApp-AI-Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Node version
        run: node --version

      - name: Install Dependencies
        run: |
          npm install
          npm list --depth=0

      - name: Check if index.js exists
        run: ls -la

      - name: Test code syntax
        run: node -c index.js

      - name: Start AI Bot
        run: npm start
